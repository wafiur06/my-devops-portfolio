name: Portfolio CI/CD (LocalStack & GitHub Pages)

on:
  push:
    branches:
      - main 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # জব ১: LocalStack S3 টেস্টিং (আপনার ডেভঅপস প্র্যাকটিস)
  localstack-test:
    runs-on: ubuntu-latest
    steps:
      # ১. সবার প্রথমে কোড রানার এনভায়রনমেন্টে নিয়ে আসতে হবে
      - name: Checkout code
        uses: actions/checkout@v4

      # ২. এরপর লোকালস্ট্যাক কন্টেইনার ফ্রেশভাবে চালু হবে
      - name: Start LocalStack
        run: |
          # যদি আগের কোনো কন্টেইনার আটকে থাকে, তবে সেটি মুছে ফেলবে
          docker rm -f localstack_ci || true
          
          # নতুন করে কন্টেইনার চালু করা (Stable v3.8.0)
          docker run -d -p 4566:4566 --name localstack_ci localstack/localstack:3.8.0
          echo "Waiting for LocalStack to be ready..."
          
          timeout=60
          elapsed=0
          
          # হেলথ চেক লুপ (সর্বোচ্চ ৬০ সেকেন্ড অপেক্ষা করবে)
          while ! curl -s http://localhost:4566/_localstack/health > /dev/null; do
            if [ $elapsed -ge $timeout ]; then
              echo "LocalStack failed to start within $timeout seconds. Here are the container logs:"
              docker logs localstack_ci
              exit 1
            fi
            echo "Still booting up, waiting 5 seconds..."
            sleep 5
            elapsed=$((elapsed+5))
          done
          
          echo "LocalStack is fully up and running!"

      - name: Install LocalStack CLI (awslocal)
        run: pip install awscli-local

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1

      - name: Create S3 Bucket and Deploy
        run: |
          awslocal s3 mb s3://my-portfolio-bucket
          awslocal s3api put-object --bucket my-portfolio-bucket --key index.html --body index.html --content-type "text/html"

      - name: Verify S3 Deployment
        run: awslocal s3 ls s3://my-portfolio-bucket/

  # জব ২: ওয়েবসাইট লাইভ করা (যাতে ব্রাউজারে দেখতে পারেন)
  github-pages-deploy:
    runs-on: ubuntu-latest
    needs: localstack-test # লোকালস্ট্যাক টেস্ট পাস করলেই কেবল লাইভ হবে
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
