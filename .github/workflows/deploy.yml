name: Portfolio CI/CD (LocalStack & GitHub Pages)

on:
  push:
    branches:
      - main 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # জব ১: LocalStack S3 টেস্টিং (আপনার ডেভঅপস প্র্যাকটিস)
  localstack-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start LocalStack
        run: |
          docker run -d -p 4566:4566 --name localstack_ci localstack/localstack:3.0.0
          echo "Waiting for LocalStack to boot up..."
          sleep 15

      - name: Install LocalStack CLI (awslocal)
        run: pip install awscli-local

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1

      - name: Create S3 Bucket and Deploy
        run: |
          awslocal s3 mb s3://my-portfolio-bucket
          awslocal s3api put-object --bucket my-portfolio-bucket --key index.html --body index.html --content-type "text/html"

      - name: Verify S3 Deployment
        run: awslocal s3 ls s3://my-portfolio-bucket/

  # জব ২: ওয়েবসাইট লাইভ করা (যাতে ব্রাউজারে দেখতে পারেন)
  github-pages-deploy:
    runs-on: ubuntu-latest
    needs: localstack-test # লোকালস্ট্যাক টেস্ট পাস করলেই কেবল লাইভ হবে
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
